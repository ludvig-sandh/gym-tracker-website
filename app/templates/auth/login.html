{% extends 'layout.html' %}

{% block css %}
    {% if mobile == True %}
        <link href="{{ url_for('static', filename='css/mobile/auth/login.css') }}" rel="stylesheet">
    {% else %}
        <link href="{{ url_for('static', filename='css/desktop/auth/login.css') }}" rel="stylesheet">
    {% endif %}
{% endblock %}

{% block content %}
    <div class="center">
        <form class="log_in_container" action="/login" method="post">
            <div>
                <div class="text_and_field">
                    <h4 class="text text_above margin_top_40px">Användarnamn</h4>
                    <input class="input_field" type="text" name="name">
                </div>
                <div class="text_and_field">
                    <h4 class="text text_above margin_top_40px">Lösenord</h4>
                    <input class="input_field" type="text" name="password">
                </div>
            </div>
            <input class="text blue_box btn" type="submit" name="log_in" value="Logga in">
        </form>
    </div>
{% endblock %}
