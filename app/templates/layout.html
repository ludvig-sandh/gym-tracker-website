<!doctype html>
<html>

  <head>
    <title>Training Progression</title>
    <meta charset="utf-8">
    <meta name="description" content={{description}}>
    
    {% if mobile == False %}
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link href="{{ url_for('static', filename='css/desktop/layout.css') }}" rel="stylesheet">
    {% else %}
        <link href="{{ url_for('static', filename='css/mobile/layout.css') }}" rel="stylesheet">
    {% endif %}
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700&display=swap" rel="stylesheet">

    <!--Stamsite-->
    <script src="{{ url_for('static', filename='js/special_dates.js') }}"></script>
    <img id="bg_image" src="/static/img/stamsite.png" alt="">
    
    {% block css %}{% endblock %}

  </head>

  <body>
    <div class="wrapper">
        <h2 class="title">{{title}}</h2>
        {% block content %}{% endblock %}
    </div>
  </body>
</html>
