services:
  web:
    build: .
    container_name: gym-tracker-website
    env_file:
      - .env
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./instance:/app/instance
    environment:
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5000
      FLASK_DEBUG: "false"
    restart: unless-stopped
